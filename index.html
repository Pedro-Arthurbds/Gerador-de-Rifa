<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Rifa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    :root {
      /* Paleta de Cores Customizada */
      --color-bg-gradient: linear-gradient(135deg, #f6f8fd 0%, #e9edf5 100%);
      --color-card-bg: rgba(255, 255, 255, 0.85);
      --color-text-main: #1e293b;
      --color-text-secondary: #64748b;
      --color-primary: #3b82f6;
      --color-primary-hover: #2563eb;
      --color-border: #e2e8f0;
      --color-success: #10b981;
      --color-danger: #ef4444;
      
      --border-radius-lg: 16px;
      --border-radius-md: 10px;
      --shadow-soft: 0 10px 40px -10px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg-gradient);
      color: var(--color-text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container { 
      width: 100%; 
      max-width: 640px; 
    }

    .card { 
      background: var(--color-card-bg); 
      backdrop-filter: blur(12px); /* Efeito de transparência/glassmorphism */
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5); 
      border-radius: var(--border-radius-lg); 
      padding: 2rem; 
      box-shadow: var(--shadow-soft);
    }

    .section-title { 
      font-size: 12px; 
      font-weight: 600; 
      color: var(--color-primary); 
      text-transform: uppercase; 
      letter-spacing: 0.1em; 
      margin-bottom: 16px; 
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }

    .field-row { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 16px; 
      margin-bottom: 16px; 
    }

    .field-group { 
      display: flex; 
      flex-direction: column; 
      gap: 6px; 
    }

    .field-group.full { 
      grid-column: 1 / -1; 
    }

    label { 
      font-size: 13px; 
      font-weight: 500;
      color: var(--color-text-secondary); 
    }

    input, textarea { 
      width: 100%; 
      box-sizing: border-box; 
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius-md);
      font-family: inherit;
      font-size: 14px;
      color: var(--color-text-main);
      background-color: #ffffff;
      transition: all 0.2s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    textarea { 
      resize: vertical; 
      min-height: 80px; 
      line-height: 1.5;
    }

    .btn-generate { 
      width: 100%; 
      padding: 14px; 
      font-size: 15px; 
      font-weight: 600; 
      background: var(--color-primary); 
      color: #ffffff; 
      border: none; 
      border-radius: var(--border-radius-md); 
      cursor: pointer; 
      margin-top: 8px; 
      transition: background-color 0.2s ease, transform 0.1s ease;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
    }

    .btn-generate:hover:not(:disabled) { 
      background: var(--color-primary-hover); 
      transform: translateY(-1px);
    }

    .btn-generate:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
      transform: none;
    }

    .status { 
      font-size: 13px; 
      font-weight: 500;
      text-align: center; 
      margin-top: 12px; 
      min-height: 20px; 
    }

    .status.ok { color: var(--color-success); }
    .status.err { color: var(--color-danger); }

    .divider { 
      border: none; 
      border-top: 1px solid var(--color-border); 
      margin: 24px 0; 
    }

    .preview-label { 
      font-size: 12px; 
      color: var(--color-text-secondary); 
      text-align: center; 
      margin-top: 12px; 
    }

    @media (max-width: 480px) {
      .field-row { grid-template-columns: 1fr; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="section-title">Cabeçalho da rifa</div>
    <div class="field-row">
      <div class="field-group full">
        <label>Título</label>
        <input type="text" id="titulo" value="RIFA EJC" />
      </div>
      <div class="field-group full">
        <label>Descrição</label>
        <textarea id="descricao">Ao participar, você contribui com as atividades do Encontro de Jovens com Cristo e ainda tem a chance de ganhar diversos brindes.</textarea>
      </div>
      <div class="field-group">
        <label>Data do sorteio</label>
        <input type="text" id="sorteio" value="18/07" />
      </div>
      <div class="field-group">
        <label>Prêmios (separados por •)</label>
        <input type="text" id="premios" value="Pizza • Moda da Casa • Pizza Calabresa • Copo Stanley • Cento de Doces" />
      </div>
    </div>
    
    <div class="divider"></div>
    
    <div class="section-title">Configuração dos números</div>
    <div class="field-row">
      <div class="field-group">
        <label>Número inicial</label>
        <input type="number" id="inicio" value="1" min="1" />
      </div>
      <div class="field-group">
        <label>Número final</label>
        <input type="number" id="fim" value="300" min="1" />
      </div>
    </div>
    
    <p id="paginas-info" style="font-size:13px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 8px; text-align: right;"></p>
    
    <button class="btn-generate" id="btn" onclick="gerar()">
      Gerar Documento .docx
    </button>
    <p class="status" id="status"></p>
    <p class="preview-label">30 números por página • layout otimizado para impressão</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script>
function atualizarInfo() {
  const inicio = parseInt(document.getElementById('inicio').value) || 1;
  const fim = parseInt(document.getElementById('fim').value) || 30;
  const total = Math.max(0, fim - inicio + 1);
  const paginas = Math.ceil(total / 30);
  document.getElementById('paginas-info').textContent =
    `Total: ${total} números → Renderiza ${paginas} página${paginas !== 1 ? 's' : ''}`;
}
document.getElementById('inicio').addEventListener('input', atualizarInfo);
document.getElementById('fim').addEventListener('input', atualizarInfo);
atualizarInfo();

async function gerar() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.className = 'status';
  status.textContent = 'Processando documento...';

  try {
    const {
      Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      AlignmentType, BorderStyle, WidthType, ShadingType, PageBreak, VerticalAlign
    } = docx;

    const titulo    = document.getElementById('titulo').value.trim() || 'RIFA EJC';
    const descricao = document.getElementById('descricao').value.trim();
    const sorteio   = document.getElementById('sorteio').value.trim();
    const premios   = document.getElementById('premios').value.trim();
    const inicio    = parseInt(document.getElementById('inicio').value) || 1;
    const fim       = parseInt(document.getElementById('fim').value) || 30;

    if (fim < inicio) {
      status.className = 'status err';
      status.textContent = 'O número final deve ser maior que o inicial.';
      btn.disabled = false;
      return;
    }

    const B = { style: BorderStyle.SINGLE, size: 4, color: '000000' };
    const borders = { top: B, bottom: B, left: B, right: B };
    const colWidths = [1080, 5400, 2880];
    const tableWidth = 9360;
    const margins = { top: 60, bottom: 60, left: 120, right: 120 };

    function makeCell(text, width, bold, centered) {
      return new TableCell({
        borders,
        width: { size: width, type: WidthType.DXA },
        shading: bold ? { fill: 'CCCCCC', type: ShadingType.CLEAR } : undefined,
        margins,
        children: [new Paragraph({
          alignment: (centered || bold) ? AlignmentType.CENTER : AlignmentType.LEFT,
          children: [new TextRun({ text, bold: !!bold, size: 20, font: 'Arial' })]
        })]
      });
    }

    const allChildren = [];

    let pageIndex = 0;
    for (let n = inicio; n <= fim; n += 30) {
      if (pageIndex > 0) {
        allChildren.push(new Paragraph({ children: [new PageBreak()] }));
      }

      allChildren.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { before: 100, after: 80 },
        children: [new TextRun({ text: titulo, bold: true, size: 32, font: 'Arial' })]
      }));

      allChildren.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { before: 0, after: 80 },
        children: [new TextRun({ text: descricao, size: 18, font: 'Arial' })]
      }));

      allChildren.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { before: 0, after: 80 },
        children: [new TextRun({ text: `Sorteio: ${sorteio}`, bold: true, size: 20, font: 'Arial' })]
      }));

      allChildren.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { before: 0, after: 160 },
        children: [
          new TextRun({ text: 'Prêmios: ', bold: true, size: 20, font: 'Arial' }),
          new TextRun({ text: premios, size: 20, font: 'Arial' })
        ]
      }));

      const rows = [];
      rows.push(new TableRow({
        tableHeader: true,
        children: [
          makeCell('Numero',   colWidths[0], true),
          makeCell('Nome',     colWidths[1], true),
          makeCell('Telefone', colWidths[2], true),
        ]
      }));

      for (let i = n; i < n + 30; i++) {
        rows.push(new TableRow({
          children: [
            makeCell(String(i),  colWidths[0], false, true),
            makeCell('',         colWidths[1], false, false),
            makeCell('',         colWidths[2], false, false),
          ]
        }));
      }

      allChildren.push(new Table({
        width: { size: tableWidth, type: WidthType.DXA },
        columnWidths: colWidths,
        rows
      }));

      pageIndex++;
    }

    const doc = new Document({
      sections: [{
        properties: {
          page: {
            size: { width: 12240, height: 15840 },
            margin: { top: 720, right: 900, bottom: 720, left: 900 }
          }
        },
        children: allChildren
      }]
    });

    const blob = await Packer.toBlob(doc);
    const fname = `Rifa_${String(inicio).padStart(3,'0')}_a_${String(fim).padStart(3,'0')}.docx`;
    saveAs(blob, fname);

    const paginas = Math.ceil((fim - inicio + 1) / 30);
    status.className = 'status ok';
    status.textContent = `✓ Sucesso! ${paginas} página${paginas > 1 ? 's' : ''} gerada${paginas > 1 ? 's' : ''} (números ${inicio}–${fim})`;
  } catch (e) {
    status.className = 'status err';
    status.textContent = 'Erro ao gerar: ' + e.message;
    console.error(e);
  }

  btn.disabled = false;
}
</script>
</body>
</html>
